name: Node.js CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]
        # Runs the build on stable modern Node.js versions compatible with TypeScript and Vite

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm' # Automatically caches npm dependencies for lightning-fast builds

    - name: Install dependencies
      run: npm ci

    - name: Run Linter (TypeScript compilation check)
      run: npm run lint

    - name: Build Application (Vite Frontend & esbuild Server)
      run: npm run build
      env:
        NODE_ENV: production

    - name: Create Production Release Archive (ZIP)
      if: matrix.node-version == '22.x'
      run: |
        # Install zip if not present (it is usually pre-installed on ubuntu-latest)
        sudo apt-get update && sudo apt-get install -y zip
        
        # Package dist, package.json, and .env.example into a single production archive
        zip -r yemeni-assistant-release.zip dist package.json .env.example
        echo "Release zip created successfully!"

    - name: Upload Production Release Artifact
      if: matrix.node-version == '22.x'
      uses: actions/upload-artifact@v4
      with:
        name: yemeni-assistant-release
        path: yemeni-assistant-release.zip
        retention-days: 7

    - name: Set up Java JDK 17
      if: matrix.node-version == '22.x'
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Ensure Capacitor Android Platform is Added and Synced
      if: matrix.node-version == '22.x'
      run: |
        if [ ! -d "android" ]; then
          npx cap add android
        fi
        npx cap sync android

    - name: Build Android APKs (Debug & Release)
      if: matrix.node-version == '22.x'
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug assembleRelease

    - name: Upload Native Android APK Artifacts
      if: matrix.node-version == '22.x'
      uses: actions/upload-artifact@v4
      with:
        name: yemeni-assistant-android-apks
        path: android/app/build/outputs/apk/**/*.apk
        retention-days: 7


