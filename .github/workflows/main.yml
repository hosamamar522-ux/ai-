name: Node.js CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]
        # نقوم بالبناء على نسخ حديثة ومستقرة من Node.js متوافقة تماماً مع Vite و TypeScript

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm' # تفعيل التخزين المؤقت للمكتبات (Caching) لتسريع عملية البناء بشكل مذهل!

    - name: Install dependencies
      run: npm ci

    - name: Run Linter (TypeScript compilation check)
      run: npm run lint

    - name: Build Application (Vite Frontend & esbuild Server)
      run: npm run build
      env:
        NODE_ENV: production
